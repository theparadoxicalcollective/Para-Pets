<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, initial-scale=1.0">
<title>Para Pets — Battle. Rise. Conquer.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" media="print" onload="this.media='all'"
  href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 600px;
    height: 600px;
    overflow: hidden;
    background: #0d0805;
  }

  .ad {
    position: relative;
    width: 600px;
    height: 600px;
    overflow: hidden;
    font-family: 'Lora', Georgia, serif;
  }

  .bg {
    position: absolute;
    inset: 0;
    background-image: url('/__mockup/ads/images/bg_volcanic_map_v2.jpeg');
    background-size: cover;
    background-position: center center;
    transform: scale(1.05);
    animation: heat 22s ease-in-out infinite alternate;
  }

  @keyframes heat {
    0%   { transform: scale(1.05) translate(0px, 0px); }
    100% { transform: scale(1.09) translate(5px, -3px); }
  }

  /* Lava/ember color cast */
  .color-cast {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 70%, rgba(200, 60, 0, 0.25) 0%, transparent 65%);
    mix-blend-mode: multiply;
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(5,2,1,0.65) 100%);
  }

  /* Bottom text gradient */
  .gradient-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 300px;
    background: linear-gradient(to top,
      rgba(4,2,1,0.97) 0%,
      rgba(8,3,1,0.85) 35%,
      rgba(12,6,3,0.45) 70%,
      transparent 100%);
  }

  /* Top fade */
  .gradient-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 130px;
    background: linear-gradient(to bottom, rgba(4,2,1,0.8) 0%, transparent 100%);
  }

  /* Logo */
  .logo {
    position: absolute;
    top: 22px;
    left: 24px;
    width: 110px;
    opacity: 0.95;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8));
  }

  /* Pet image */
  .pet {
    position: absolute;
    right: 16px;
    bottom: 180px;
    width: 210px;
    height: 210px;
    object-fit: contain;
    filter:
      drop-shadow(0 0 30px rgba(255,120,20,0.65))
      drop-shadow(0 0 10px rgba(255,50,0,0.5))
      brightness(1.08);
    animation: float 4.2s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-10px); }
  }

  /* Sword accessory */
  .sword {
    position: absolute;
    right: 38px;
    bottom: 368px;
    width: 72px;
    height: 72px;
    object-fit: contain;
    filter: drop-shadow(0 0 16px rgba(255,160,30,0.8));
    transform: rotate(25deg);
    animation: sway 3.5s ease-in-out infinite;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(25deg) translateY(0px); }
    50%       { transform: rotate(20deg) translateY(-8px); }
  }

  /* Ember particles */
  .ember {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #ff8c00, #ff4400);
    opacity: 0;
    animation: rise var(--dur, 3s) ease-out var(--delay, 0s) infinite;
  }

  @keyframes rise {
    0%   { opacity: 0.8; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.3); }
  }

  /* Text block */
  .text-block {
    position: absolute;
    bottom: 36px;
    left: 28px;
    right: 28px;
  }

  .eyebrow {
    font-family: 'Lora', Georgia, serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #ff9a3c;
    opacity: 0.9;
    margin-bottom: 10px;
  }

  .headline {
    font-family: 'Lora', Georgia, serif;
    font-size: 40px;
    font-weight: 700;
    line-height: 1.1;
    color: #fff5ee;
    text-shadow: 0 2px 24px rgba(200,50,0,0.5), 0 0 50px rgba(255,80,0,0.2);
    margin-bottom: 12px;
  }

  .headline em {
    font-style: italic;
    color: #ff9a3c;
  }

  .subline {
    font-family: 'Lora', Georgia, serif;
    font-size: 15px;
    font-weight: 400;
    font-style: italic;
    color: #c4906a;
    letter-spacing: 0.03em;
    opacity: 0.9;
    margin-bottom: 18px;
  }

  .tagline {
    display: inline-block;
    font-family: 'Lora', Georgia, serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #1a0800;
    background: linear-gradient(135deg, #ff8c00, #ff5500);
    padding: 6px 16px;
    border-radius: 2px;
    box-shadow: 0 0 20px rgba(255,100,0,0.4);
  }

  .divider {
    width: 48px;
    height: 1.5px;
    background: linear-gradient(to right, #ff8c00, transparent);
    margin-bottom: 12px;
    opacity: 0.8;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="bg"></div>
  <div class="color-cast"></div>
  <div class="vignette"></div>
  <div class="gradient-top"></div>
  <div class="gradient-bottom"></div>

  <!-- Ember particles -->
  <div class="ember" style="width:5px;height:5px;left:38%;bottom:200px;--dur:2.8s;--delay:0s;"></div>
  <div class="ember" style="width:4px;height:4px;left:45%;bottom:230px;--dur:3.5s;--delay:0.6s;"></div>
  <div class="ember" style="width:6px;height:6px;left:52%;bottom:180px;--dur:2.4s;--delay:1.1s;"></div>
  <div class="ember" style="width:3px;height:3px;left:60%;bottom:260px;--dur:3.8s;--delay:0.4s;"></div>
  <div class="ember" style="width:5px;height:5px;left:32%;bottom:210px;--dur:2.9s;--delay:1.8s;"></div>

  <!-- Logo -->
  <img class="logo" src="/__mockup/ads/images/logo_parapets_v4.png" alt="Para Pets">

  <!-- Sword + Pet -->
  <img class="sword" src="/__mockup/ads/images/accessory_volcanic_sword.png" alt="">
  <img class="pet" src="/__mockup/ads/images/betta_crimson.png" alt="Crimson Betta">

  <!-- Text -->
  <div class="text-block">
    <div class="eyebrow">Volcanic Isle</div>
    <div class="divider"></div>
    <div class="headline">Battle.<br><em>Rise.</em> Conquer.</div>
    <div class="subline">Train powerful pets and dominate the realm</div>
    <div class="tagline">Play Para Pets Free</div>
  </div>
</div>
</body>
</html>
