<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a1a05"/>
      <stop offset="100%" stop-color="#1a0a02"/>
    </radialGradient>
    <radialGradient id="medallionGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5e070"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#8b5e10"/>
    </radialGradient>
    <radialGradient id="gemGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff9090"/>
      <stop offset="100%" stop-color="#cc2020"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="100" height="100" rx="16" fill="url(#bgGrad)"/>

  <polygon points="50,8 53,18 63,18 55,24 58,34 50,28 42,34 45,24 37,18 47,18"
