  <line x1="30" y1="30" x2="42" y2="38" stroke="url(#medallionGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="30" x2="58" y2="38" stroke="url(#medallionGrad)" stroke-width="4" stroke-linecap="round"/>

  <circle cx="50" cy="62" r="26" fill="#2a0d02" stroke="#8b5e10" stroke-width="2"/>
  <circle cx="50" cy="62" r="24" fill="url(#medallionGrad)" opacity="0.15"/>
  <circle cx="50" cy="62" r="22" fill="none" stroke="#d4a017" stroke-width="1" opacity="0.6"/>
  <circle cx="50" cy="62" r="20" fill="none" stroke="#f0c040" stroke-width="0.5" opacity="0.4"/>

  <circle cx="50" cy="62" r="26" fill="none" stroke="#f5e070" stroke-width="1.5" opacity="0.8"/>
  <circle cx="50" cy="62" r="24" fill="none" stroke="#8b5e10" stroke-width="0.5"/>

  <polygon points="50,46 52.5,54 61,54 54.5,59 57,67 50,62 43,67 45.5,59 39,54 47.5,54"
