  <circle cx="50" cy="56" r="3" fill="url(#gemGrad)" opacity="0.9"/>

  <circle cx="50" cy="62" r="26" fill="none" stroke="#f5e070" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.35"/>
